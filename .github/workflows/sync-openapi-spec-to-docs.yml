name: Sync OpenAPI to docs repo
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - "openapi.yaml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout openapi-spec
        uses: actions/checkout@v4

      - name: Set up SSH for deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone docs repo
        run: |
          git clone git@github.com:togethercomputer/mintlify-docs.git
          cp openapi.yaml mintlify-docs/openapi.yaml

      - name: Commit and push update
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
        run: |
          cd mintlify-docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet openapi.yaml; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH_NAME=sync-openapi

          git checkout -b "$BRANCH_NAME"
          git add openapi.yaml
          git commit -m "Sync OpenAPI spec"
          git push --force origin "$BRANCH_NAME"

          EXISTING_PR=$(gh pr list --state open --head "$BRANCH_NAME" --json number --jq '.[0].number')

          # Perpetual Linear tracker issue. The bare key (no Resolves/Closes/Fixes)
          # auto-attaches each sync PR to the issue without closing it on merge.
          # See https://linear.app/together-ai/issue/DX-548 — do not close it.
          TRACKER_KEY="DX-548"
          PR_TITLE="$TRACKER_KEY: Sync OpenAPI spec"
          PR_BODY="This PR syncs the openapi.yaml from the togethercomputer/openapi repository.

          Tracked in $TRACKER_KEY (auto-attached perpetual tracker — do not close)."

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH_NAME" \
              --assignee ryanto,zainhas,Nutlope,muhsinking
          fi
